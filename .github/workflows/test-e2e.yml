name: "End-to-end validation test"

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  e2e:
    runs-on: "ubuntu-slim"
    permissions:
      issues: "write"
    env:
      GH_REPO: "${{ github.repository }}"
      GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5"  # v4

      - name: "Install uv"
        uses: "astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78"  # v7

      - name: "Install gh-issue-validator from source"
        run: "uv sync"

      - name: "Create test issue"
        id: "create-issue"
        run: |
          issue_url=$(gh issue create \
            --title "[IGNORE] End-to-end test artifact" \
            --body-file .github/e2e-test-issue.md \
            --label test)
          echo "number=${issue_url##*/}" >> "$GITHUB_OUTPUT"

      - name: "Run validator"
        env:
          GITHUB_REPOSITORY: "${{ github.repository }}"
          GITHUB_ISSUE_NUMBER: "${{ steps.create-issue.outputs.number }}"
        run: "uv run .github/issue_validator.py"

      - name: "Assert validation comment was posted"
        env:
          GITHUB_ISSUE_NUMBER: "${{ steps.create-issue.outputs.number }}"
        run: |
          body=$(gh api "repos/$GH_REPO/issues/$GITHUB_ISSUE_NUMBER/comments" \
            --jq '[.[].body | select(contains("<!-- gh-issue-validator -->"))] | length')
          if [[ "$body" -lt 1 ]]; then
            echo "Error: no validation comment found on issue #$GITHUB_ISSUE_NUMBER" >&2
            exit 1
          fi

      - name: "Assert comment reports validation success"
        env:
          GITHUB_ISSUE_NUMBER: "${{ steps.create-issue.outputs.number }}"
        run: |
          body=$(gh api "repos/$GH_REPO/issues/$GITHUB_ISSUE_NUMBER/comments" \
            --jq '[.[].body | select(contains("Validation successful"))] | length')
          if [[ "$body" -lt 1 ]]; then
            echo "Error: validation comment does not report success" >&2
            exit 1
          fi

      - name: "Close test issue"
        if: "always()"
        env:
          GITHUB_ISSUE_NUMBER: "${{ steps.create-issue.outputs.number }}"
        run: |
          gh issue close "$GITHUB_ISSUE_NUMBER" --reason "not planned"
